name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install -e .

      - name: Check syntax
        run: |
          source .venv/bin/activate
          python -c "import ast; ast.parse(open('notebooklm_mcp/server.py').read()); print('server.py OK')"
          python -c "import ast; ast.parse(open('notebooklm_mcp/auth_cli.py').read()); print('auth_cli.py OK')"

      - name: Verify imports and tool registration
        run: |
          source .venv/bin/activate
          python -c "
          from notebooklm_mcp.server import mcp
          tools = [t.name for t in mcp._tool_manager._tools.values()]
          assert len(tools) == 31, f'Expected 31 tools, got {len(tools)}'
          print(f'All {len(tools)} tools registered')
          "

      - name: Run auth parser tests
        run: |
          source .venv/bin/activate
          python test_auth_parsing.py

      - name: Run MCP protocol test
        run: |
          source .venv/bin/activate
          python test_mcp.py
